<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-600 -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#4F46E5"/>
      <stop offset="50%"  stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
  </defs>

  <!-- scale entire icon content to 85% and center: (512 - 512*0.85)/2 = 38.4 -->
  <g transform="translate(38.4, 38.4) scale(0.85)">

    <!-- rounded-xl background -->
    <rect width="512" height="512" rx="115" fill="url(#bg)"/>

    <!-- Moon (lucide): centered 200×200 -->
    <!-- center: (256-100, 256-100) = (156, 156) -->
    <svg x="156" y="156" width="200" height="200" viewBox="0 0 24 24" fill="none">
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"
            stroke="#FDE68A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <!-- Star (lucide): top-right, 110×110 -->
    <!-- left = 512-51-110 = 351 -->
    <svg x="351" y="51" width="110" height="110" viewBox="0 0 24 24" fill="none">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
               stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

  </g>
</svg>
